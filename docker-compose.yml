services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: titanic_backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: titanic_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend